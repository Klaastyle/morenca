<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Pots canviar el títol de la pestanya del navegador aquí -->
    <title>Pendent de regularització.</title>
    <meta name="description" content="El valor de la paraula donada i el compromís en el sector de la construcció.">
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome per a icones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="minimalist-body">

    <!-- Efecte de llum daurada de fons -->
    <div class="glow-accent"></div>

    <main class="minimalist-container">
        <div class="message-wrapper">
            <!-- Logotip de la capçalera (es pot canviar l'arxiu a img/logo.png) -->
            <div class="logo-container">
                <img src="img/logo.png" alt="Logo Coordinadora" class="main-logo">
            </div>
            
            <!-- Missatge principal (títol gran) -->
            <h1 class="main-statement">Pendent de <span class="gradient-text">regularització.</span></h1>
            
            
            <!-- Línia de separació daurada decorativa -->
            <div class="separator-line"></div>
            
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
